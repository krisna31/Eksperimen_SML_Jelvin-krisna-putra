name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: "Eksperimen_SML_Jelvin-krisna-putra/employee_churn_data_raw.csv"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas seaborn matplotlib scikit-learn
      - name: Run preprocessing script
        run: |
          cd preprocessing
          python ./automate_jelvin_krisna_putra.py
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Automated data preprocessing"
          git push origin main
